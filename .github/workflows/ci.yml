name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (typecheck · tests · build)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lodenica
          POSTGRES_PASSWORD: lodenica
          POSTGRES_DB: lodenica
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lodenica"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://lodenica:lodenica@localhost:5432/lodenica?schema=public
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Prisma generate
        run: pnpm prisma generate

      - name: Apply migrations
        run: pnpm prisma migrate deploy

      - name: Lint (best-effort)
        run: pnpm lint || echo "lint warnings"
        continue-on-error: true

      - name: Unit tests
        run: pnpm test --ci

      - name: Build
        run: pnpm build

  frontend:
    name: Frontend (typecheck · tests · build)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Type-check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
