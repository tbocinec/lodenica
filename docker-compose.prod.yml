name: lodenica-prod

# Production stack — pulls pre-built images from GHCR. Caddy fronts the
# frontend container and terminates TLS using Let's Encrypt certificates
# issued automatically via ACME HTTP-01 (requires inbound port 80 reachable
# from the public internet).
#
# Provide an `.env` file with at least:
#   GHCR_OWNER=tbocinec
#   IMAGE_TAG=latest
#   POSTGRES_USER=…  POSTGRES_PASSWORD=…  POSTGRES_DB=…
#   DOMAIN=lodenica.example.com
#   ACME_EMAIL=ops@example.com
#   BACKEND_CORS_ORIGINS=https://lodenica.example.com

services:
  postgres:
    image: postgres:16-alpine
    container_name: lodenica-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${GHCR_OWNER}/lodenica-backend:${IMAGE_TAG:-latest}
    container_name: lodenica-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
    command: sh -c "pnpm prisma migrate deploy && node dist/main.js"

  frontend:
    image: ghcr.io/${GHCR_OWNER}/lodenica-frontend:${IMAGE_TAG:-latest}
    container_name: lodenica-frontend
    restart: always
    depends_on:
      - backend
    # Only bind on the loopback so Caddy (on host network) can reach it
    # without exposing the unencrypted frontend to the public internet.
    ports:
      - "127.0.0.1:8080:80"

  caddy:
    image: caddy:2-alpine
    container_name: lodenica-caddy
    restart: always
    depends_on:
      - frontend
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    # Host networking avoids the Docker bridge egress issues we hit on the
    # default EC2 networking, and gives Caddy direct access to ports 80/443
    # plus public DNS. Caddy reaches the SPA via the localhost-bound
    # frontend container at 127.0.0.1:8080.
    network_mode: host
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # persisted certs & private keys
      - caddy-config:/config

volumes:
  postgres-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
