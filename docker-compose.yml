name: lodenica

services:
  postgres:
    image: postgres:16-alpine
    container_name: lodenica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lodenica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lodenica}
      POSTGRES_DB: ${POSTGRES_DB:-lodenica}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lodenica} -d ${POSTGRES_DB:-lodenica}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: lodenica-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${BACKEND_NODE_ENV:-development}
      PORT: 3000
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-debug}
      DATABASE_URL: postgresql://${POSTGRES_USER:-lodenica}:${POSTGRES_PASSWORD:-lodenica}@postgres:5432/${POSTGRES_DB:-lodenica}?schema=public
      CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://localhost:4173}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/test:/app/test
    command: sh -c "pnpm prisma migrate deploy && pnpm prisma db seed && pnpm start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: lodenica-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:3000/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    command: pnpm dev --host 0.0.0.0

volumes:
  postgres-data:
    driver: local
