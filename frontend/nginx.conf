server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy API calls to the backend container.
  # Frontend uses VITE_API_BASE_URL=/api/v1 in production builds, so XHRs
  # arrive on the same origin and skip CORS preflights entirely.
  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # Backend liveness / docs reachable via the same origin.
  location = /health {
    proxy_pass http://backend:3000/health;
  }
  location /docs {
    proxy_pass http://backend:3000/docs;
  }
  location /docs-json {
    proxy_pass http://backend:3000/docs-json;
  }

  # Long-term cache for fingerprinted assets.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Disable caching of the entry point so updates roll out immediately.
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # SPA routing — fall back to index.html for unknown paths.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Sane defaults
  client_max_body_size 5M;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
